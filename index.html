<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Prompt Builder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f4f0;color:#1a1a18;padding:2rem 1rem}
.wrap{max-width:720px;margin:0 auto}
h1{font-size:18px;font-weight:500;margin-bottom:1.5rem;color:#1a1a18}
.section{margin-bottom:1.25rem;background:#ffffff;border:0.5px solid #d3d1c7;border-radius:12px;padding:1rem 1.25rem}
.sec-title{font-size:12px;font-weight:500;color:#888780;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem}
.field{margin-bottom:.75rem}
.field:last-child{margin-bottom:0}
label{display:block;font-size:13px;color:#5f5e5a;margin-bottom:4px}
input[type=text],textarea,select{width:100%;font-size:14px;color:#1a1a18;background:#f5f4f0;border:0.5px solid #d3d1c7;border-radius:8px;padding:7px 10px;outline:none;transition:border .15s;font-family:inherit}
input[type=text]:focus,textarea:focus,select:focus{border-color:#888780}
textarea{resize:vertical;min-height:72px;line-height:1.6}
.chip-group{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:13px;padding:5px 12px;border-radius:20px;border:0.5px solid #b4b2a9;background:#f5f4f0;color:#5f5e5a;cursor:pointer;transition:all .15s;user-select:none}
.chip.active{background:#e6f1fb;color:#185fa5;border-color:#378add}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.output-box{background:#f5f4f0;border:0.5px solid #d3d1c7;border-radius:8px;padding:1rem;font-size:13px;line-height:1.8;color:#1a1a18;white-space:pre-wrap;min-height:120px;font-family:ui-monospace,monospace}
.btn-row{display:flex;gap:8px;margin-top:1rem}
button{font-size:13px;padding:7px 16px;border-radius:8px;border:0.5px solid #b4b2a9;background:transparent;color:#1a1a18;cursor:pointer;transition:all .15s;font-family:inherit}
button:hover{background:#f5f4f0}
button:active{transform:scale(.98)}
.btn-copy{font-weight:500}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;margin-left:6px;background:#faeeda;color:#854f0b}
@media(max-width:500px){.row2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
<h1>Gemini Prompt Builder</h1>

<div class="section">
  <div class="sec-title">第一層　角色錨定</div>
  <div class="row2">
    <div class="field">
      <label>角色一　姓名</label>
      <input type="text" id="c1name" placeholder="南雁" value="南雁">
    </div>
    <div class="field">
      <label>角色一　外貌特徵</label>
      <input type="text" id="c1desc" placeholder="黑色長髮、灰色眼睛、低髮髻" value="黑色長髮、灰色眼睛、低髮髻">
    </div>
  </div>
  <div class="row2">
    <div class="field">
      <label>角色二　姓名</label>
      <input type="text" id="c2name" placeholder="辛癸" value="辛癸">
    </div>
    <div class="field">
      <label>角色二　外貌特徵</label>
      <input type="text" id="c2desc" placeholder="黑棕色長髮、辮子、琥珀色眼睛、暖棕色皮膚" value="黑棕色長髮、辮子、琥珀色眼睛、暖棕色皮膚">
    </div>
  </div>
</div>

<div class="section">
  <div class="sec-title">第二層　畫面風格</div>
  <div class="field">
    <label>畫風技法</label>
    <div class="chip-group" id="chips-style">
      <span class="chip active" data-val="半寫實動漫風格，參照附圖畫風">半寫實動漫</span>
      <span class="chip" data-val="水墨畫風格，線條寫意，墨色暈染">水墨</span>
      <span class="chip" data-val="厚塗油畫風格，筆觸明顯，質感豐富">厚塗油畫</span>
      <span class="chip" data-val="淡彩水彩風格，透明感，邊緣柔和">淡彩水彩</span>
      <span class="chip" data-val="電影截圖質感，寫實攝影感">電影截圖感</span>
    </div>
  </div>
  <div class="field">
    <label>光線性質</label>
    <div class="chip-group" id="chips-light">
      <span class="chip" data-val="正午烈日直射，強光高反差">正午烈日</span>
      <span class="chip" data-val="黃昏側光，橙金暖調，長影">黃昏側光</span>
      <span class="chip active" data-val="燭光昏黃，跳動光源，陰影濃重">燭光</span>
      <span class="chip" data-val="陰天漫射光，柔和均勻，無明顯陰影">陰天漫射</span>
      <span class="chip" data-val="月光冷白，高對比，靜謐感">月光冷白</span>
    </div>
  </div>
  <div class="field">
    <label>整體色調</label>
    <div class="chip-group" id="chips-tone">
      <span class="chip active" data-val="高飽和大地色系，暖棕、深褐、鮮豔民族色">大地色系</span>
      <span class="chip" data-val="冷藍灰調，低飽和，霧感">冷藍灰</span>
      <span class="chip" data-val="暖金橙調，飽和，豐盛感">暖金橙</span>
      <span class="chip" data-val="低飽和莫蘭迪色，柔和，克制">莫蘭迪</span>
      <span class="chip" data-val="高對比黑白灰，戲劇感">黑白高對比</span>
    </div>
  </div>
  <div class="field">
    <label>補充畫風描述（手動輸入）</label>
    <input type="text" id="style-extra" placeholder="例：丁達爾光束穿透揚塵，電影截圖質感">
  </div>
</div>

<div class="section">
  <div class="sec-title">第三層　構圖</div>
  <div class="row2">
    <div class="field">
      <label>鏡頭距離</label>
      <select id="shot">
        <option value="特寫鏡頭，臉部細節清晰">特寫</option>
        <option value="中景鏡頭，上半身完整可見" selected>中景</option>
        <option value="中長焦鏡頭，兩人全身可見">中長焦</option>
        <option value="遠景鏡頭，強調空間與環境">遠景</option>
      </select>
    </div>
    <div class="field">
      <label>視角</label>
      <select id="angle">
        <option value="平視角度，自然真實">平視</option>
        <option value="略微仰拍，強調高大感" selected>略微仰拍</option>
        <option value="俯拍視角，強調空間俯瞰感">俯拍</option>
        <option value="三分之二側視角，斜後方切入">三分之二側</option>
      </select>
    </div>
  </div>
  <div class="row2">
    <div class="field">
      <label>畫面比例</label>
      <select id="ratio">
        <option value="尺寸：16:9 橫式" selected>16:9 橫式</option>
        <option value="尺寸：9:16 直式">9:16 直式</option>
        <option value="尺寸：1:1 方形">1:1 方形</option>
        <option value="尺寸：4:3">4:3</option>
      </select>
    </div>
    <div class="field">
      <label>構圖補充</label>
      <input type="text" id="comp-extra" placeholder="例：焦點落在兩人手部與表情">
    </div>
  </div>
  <div class="field">
    <label>背景描述</label>
    <input type="text" id="bg" placeholder="例：部落廣場、觀眾人群、遠山與藍天">
  </div>
</div>

<div class="section">
  <div class="sec-title">第四層　人物細節</div>
  <div class="field">
    <label>角色一　服裝與動作</label>
    <textarea id="c1action" placeholder="例：藕粉色休閒長裙，雙手半空鼓掌，黑髮幾縷在金光中飛舞"></textarea>
  </div>
  <div class="field">
    <label>角色二　服裝與動作</label>
    <textarea id="c2action" placeholder="例：深色亞麻無袖背心，獸骨頸飾，右手環腰，左手指向廣場中心"></textarea>
  </div>
  <div class="field">
    <label>兩人關係與距離</label>
    <input type="text" id="relation" placeholder="例：零距離，辛癸胸膛緊貼南雁背脊">
  </div>
</div>

<div class="section">
  <div class="sec-title">第五層　氛圍補充 <span class="tag">可選</span></div>
  <div class="field">
    <textarea id="vibe" placeholder="例：空氣中混合泥土腥甜、汗水與小米酒醇香，畫面充滿動態感與生命力" style="min-height:56px"></textarea>
  </div>
</div>

<div class="section">
  <div class="sec-title">產出</div>
  <div class="output-box" id="output">（填寫上方欄位後自動生成）</div>
  <div class="btn-row">
    <button class="btn-copy" onclick="copyPrompt()">複製 prompt</button>
    <button onclick="clearAll()">清除全部</button>
  </div>
</div>

</div>
<script>
function g(id){return document.getElementById(id)}
function val(id){return g(id).value.trim()}

function getChips(groupId){
  const active=[...document.querySelectorAll('#'+groupId+' .chip.active')];
  return active.map(c=>c.dataset.val).join('，');
}

document.querySelectorAll('.chip').forEach(c=>{
  c.addEventListener('click',()=>{
    const group=c.parentElement;
    group.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
    render();
  });
});

['c1name','c1desc','c2name','c2desc','style-extra','comp-extra','bg','c1action','c2action','relation','vibe'].forEach(id=>{
  g(id).addEventListener('input',render);
});
['shot','angle','ratio'].forEach(id=>{
  g(id).addEventListener('change',render);
});

function render(){
  const c1n=val('c1name')||'角色一';
  const c1d=val('c1desc');
  const c2n=val('c2name')||'角色二';
  const c2d=val('c2desc');
  const styleChip=getChips('chips-style');
  const lightChip=getChips('chips-light');
  const toneChip=getChips('chips-tone');
  const styleExtra=val('style-extra');
  const shot=g('shot').value;
  const angle=g('angle').value;
  const ratio=g('ratio').value;
  const compExtra=val('comp-extra');
  const bg=val('bg');
  const c1action=val('c1action');
  const c2action=val('c2action');
  const relation=val('relation');
  const vibe=val('vibe');

  let lines=[];
  lines.push('【指令】直接生成圖片。');
  if(c1d) lines.push('第一張附圖角色：'+c1n+'（'+c1d+'）');
  else lines.push('第一張附圖角色：'+c1n);
  if(c2d) lines.push('第二張附圖角色：'+c2n+'（'+c2d+'）');
  else lines.push('第二張附圖角色：'+c2n);
  lines.push('臉部特徵嚴格參照附圖，不得更動。');
  lines.push('');
  lines.push('【畫面風格】');
  const styleAll=[styleChip,lightChip,toneChip,styleExtra].filter(Boolean).join('。');
  if(styleAll) lines.push(styleAll+'。');
  lines.push('');
  lines.push('【構圖】');
  const compAll=[ratio+'。'+shot+'，'+angle+'。',compExtra,bg?'背景：'+bg:''].filter(Boolean).join(' ');
  lines.push(compAll);
  lines.push('');
  lines.push('【人物細節】');
  if(c1action) lines.push(c1n+'：'+c1action);
  if(c2action) lines.push(c2n+'：'+c2action);
  if(relation) lines.push('兩人關係：'+relation);
  if(vibe){
    lines.push('');
    lines.push('【氛圍補充】');
    lines.push(vibe);
  }
  lines.push('');
  lines.push('高品質，高解析，8K。');
  g('output').textContent=lines.join('\n');
}

function copyPrompt(){
  const text=g('output').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.querySelector('.btn-copy');
    btn.textContent='已複製';
    setTimeout(()=>{btn.textContent='複製 prompt'},1500);
  });
}

function clearAll(){
  ['c1name','c1desc','c2name','c2desc','style-extra','comp-extra','bg','c1action','c2action','relation','vibe'].forEach(id=>{g(id).value=''});
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  render();
}

render();
</script>
</body>
</html>
